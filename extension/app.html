<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>better-tss</title>
    <link rel="stylesheet" href="app.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-title">better-tss</div>
      <div class="topbar-brand">
        <span class="unofficial">UNOFFICIAL</span>
        <span class="wordmark">UC San Diego</span>
      </div>
    </header>

    <div class="disclaimer">
      Unofficial, student-made planning tool —
      <strong>not affiliated with, endorsed by, or operated by UC San Diego.</strong>
      Runs entirely in your browser on your own TSS session.
    </div>

    <main class="wrap">
      <div class="page-head">
        <h1 class="page-title">Schedule Planner</h1>
        <div class="term">
          <select id="year">
            <option value="2026/2027" selected>2026/2027</option>
            <option value="2025/2026">2025/2026</option>
          </select>
          <select id="term">
            <option value="Fall Quarter" selected>Fall Quarter</option>
            <option value="Winter Quarter">Winter Quarter</option>
            <option value="Spring Quarter">Spring Quarter</option>
            <option value="Summer Session I">Summer Session I</option>
            <option value="Summer Session II">Summer Session II</option>
          </select>
        </div>
      </div>

      <section id="login-banner" class="login-banner" hidden>
        <span>Your TSS session isn't active. Log in, then come back and search.</span>
        <button id="login-btn" type="button">Log in to TSS</button>
      </section>

      <form id="search-form" class="searchbar">
        <input
          id="query"
          type="text"
          placeholder="Search classes — e.g. CSE, CSE 30"
          autocomplete="off"
          autofocus
        />
        <button type="submit">Search</button>
      </form>

      <p id="status" class="status"></p>
      <div id="results" class="results"></div>

      <div class="schedule-head">
        <h2>Your schedule</h2>
        <button id="clear-cal" class="ghost-btn" type="button">Clear</button>
      </div>
      <div id="schedule-list" class="schedule-list"></div>

      <div id="calendar" class="calendar"></div>
      <p id="cal-note" class="cal-note"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
